<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Portal do Paciente - Offline</title>
  <link rel="stylesheet" href="/assets/css/design-system.css" />
</head>
<body class="lc-body">
  <div class="lc-shell" style="max-width:720px; margin:0 auto; padding:24px;">
    <div class="lc-card">
      <div class="lc-card__header">Você está offline</div>
      <div class="lc-card__body">
        <div class="lc-alert lc-alert--info">
          Não foi possível carregar o Portal do Paciente. Verifique sua conexão e tente novamente.
        </div>
        <div style="margin-top:12px;">
          <a class="lc-btn lc-btn--secondary" href="/portal">Tentar novamente</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
